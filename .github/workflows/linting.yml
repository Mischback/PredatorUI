name: Lint

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run luacheck
        uses: nebularg/actions-luacheck@v1
        with:
          annotate: warning
          args: --no-color
